<!DOCTYPE html>
<meta charset="utf-8" />
<title>Gist Pages</title>

<style>
</style>

<script type="module">
	const deploy_root = "{{deploy_root}}" // ← github ci で置換
	const sw_path = `/${deploy_root}/sw.js`

	const statusEl = document.getElementById("status")

	async function init() {
		try {
			const reg = await navigator.serviceWorker.register(sw_path)
			console.log("Registered", reg)

			if (navigator.serviceWorker.controller) {
				statusEl.textContent = "Service Worker が有効です"
			}
		} catch (err) {
			statusEl.textContent = "登録エラー: " + err.message
		}
	}

	init()
</script>

<div id="status">
	Loading
</div>
